version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: well-management-db
    environment:
      POSTGRES_USER: well_admin
      POSTGRES_PASSWORD: Well@2024
      POSTGRES_DB: well_management
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U well_admin -d well_management"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: well-management-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://well_admin:Well@2024@db:5432/well_management
      SECRET_KEY: well-management-secret-key-2024
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      TZ: Asia/Shanghai
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: well-management-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
    name: well-management-postgres-data
